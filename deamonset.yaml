apiVersion: apps/v1
kind: DeamonSet
metadata: 
  name: my-deamonste
spec:
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-container2
        image: nginx:latest
        ports:
        - containerPort: 80
