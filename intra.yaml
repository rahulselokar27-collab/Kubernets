apiVersion: v1
kind: Pod
metadata:
  name: intrapod-demo
spec:
  containers:
  - name: my-container
    image: nginx
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"

  - name: alpine-container
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
      - |
        while true; do
          echo "Hello from the alpine container!"
          sleep 5
        done
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"
        