apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

#create pvc
#kubectl apply -f pvc.yaml      

#check pvc
#kubectl get pvc

#Describe PVC
#kubectl describe pvc my-pvc

#Pod with PVC
---
apiVersion: v1
kind: Pod
metadata:
  name: test-pvc-pod
spec:
  containers:
  - name: my-container
    image: nginx
    volumeMounts:
    - mountPath: "/usr/share/nginx/html"
      name: my-storage

  volumes:
  - name: my-storage
    persistentVolumeClaim:
      claimName: my-pvc

#Apply the pod manifest
#kubectl apply -f pod-with-pvc.yaml      